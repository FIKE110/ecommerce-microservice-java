#Ecommerce Microservices CI/CD
name: ecommerce-java-ms-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: "${{secrets.DOCKER_USERNAME}}"
  VPS_USERNAME: "${{secrets.VPS_USERNAME}}"
  VPS_PASSWORD: "${{secrets.VPS_PASSWORD}}"
  VPS_PORT: "${{secrets.VPS_PORT}}"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with maven
        run: mvn clean install -DskipTests

      - name: Build all docker images
        run: ./scripts/docker.sh build

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push all docker images
        run: ./scripts/docker.sh push

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        include:
#          - service: config-server
#            port: 8888
#            vps_host: ${{ secrets.VPS_HOST_CONFIG }}
          - service: service-discovery
            port: 8761
            vps_host: ${{ secrets.VPS_HOST_EUREKA }}
#          - service: auth-service
#            port: 8081
#            db_port: 5433
#            vps_host: ${{ secrets.VPS_HOST_AUTH }}
#          - service: customer-service
#            port: 8080
#            db_port: 5434
#            vps_host: ${{ secrets.VPS_HOST_CUSTOMER }}
#          - service: product-service
#            port: 8082
#            db_port: 5435
#            vps_host: ${{ secrets.VPS_HOST_PRODUCT }}
#          - service: inventory-service
#            port: 8083
#            db_port: 5436
#            vps_host: ${{ secrets.VPS_HOST_INVENTORY }}
#          - service: order-service
#            port: 8084
#            db_port: 5437
#            vps_host: ${{ secrets.VPS_HOST_ORDER }}
#          - service: payment-service
#            port: 8085
#            db_port: 5438
#            vps_host: ${{ secrets.VPS_HOST_PAYMENT }}
#          - service: notification-service
#            port: 8086
#            db_port: 5439
#            vps_host: ${{ secrets.VPS_HOST_NOTIFICATION }}
#          - service: cart-service
#            port: 8087
#            db_port: 5440
#            vps_host: ${{ secrets.VPS_HOST_CART }}
#          - service: api-gateway
#            port: 8000
#            vps_host: ${{ secrets.VPS_HOST_GATEWAY }}
#          - service: admin-server
#            port: 9090
#            vps_host: ${{ secrets.VPS_HOST_ADMIN }}
#          - service: api-docs
#            port: 9091
#            vps_host: ${{ secrets.VPS_HOST_DOCS }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy ${{ matrix.service }} to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ matrix.vps_host }}
          username: ${{ env.VPS_USERNAME }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            SERVICE_NAME=${{ matrix.service }}
            cd ~/$SERVICE_NAME
            git pull origin main
            docker pull fortuneiyke/ecommerce-$SERVICE_NAME:latest
            docker compose down
            docker compose up -d

  deploy-infrastructure:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy RabbitMQ and Zipkin to infrastructure VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST_INFRA }}
          username: ${{ env.VPS_USERNAME }}
          password: ${{ env.VPS_PASSWORD }}
          port: ${{ env.VPS_PORT }}
          script: |
            mkdir -p ~/infrastructure
            cd ~/infrastructure
            
            cat > docker-compose.yml << EOF
            services:
              rabbitmq:
                image: rabbitmq:3-management
                ports:
                  - "5672:5672"
                  - "15672:15672"
                environment:
                  - RABBITMQ_DEFAULT_USER=guest
                  - RABBITMQ_DEFAULT_PASS=guest

              zipkin:
                image: openzipkin/zipkin
                ports:
                  - "9411:9411"
            EOF
            
            docker compose up -d
