#My docker compose
name: ecommerce-java-ms-ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  DOCKERHUB_USERNAME: "${{secrets.DOCKER_USERNAME}}"
  REPO_NAME: "ecommerce-microservice-java"
  API_GATEWAY_PORT: 8081
  API_DOCS_PORT: 9091
  ADMIN_SERVER_PORT: 9090
  AUTH_SERVICE_PORT: 0
  CART_SERVICE_PORT: 0
  CUSTOMER_SERVICE_PORT: 0
  INVENTORY_SERVICE_PORT: 0
  NOTIFICATION_SERVICE_PORT: 8086
  ORDER_SERVICE_PORT: 0
  PAYMENT_SERVICE_PORT: 0
  PRODUCT_SERVICE_PORT: 0
  CONFIG_SERVER_PORT: 8888
  EUREKA_PORT: 8761

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: set up jdk 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build with maven
        run: mvn clean install

      - name: Build with script
        run: ./scripts/build.sh backend

      - name: build all docker images
        run: ./scripts/docker.sh build

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: push to dockerhub
        run: ./scripts/docker.sh push

      - name: Execute remote SSH commands on vps
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ github.event.repository.name }}
            git pull
            docker compose pull
            docker compose up -d
