services:
  notification-service:
    image: fortuneiyke/ecommerce-notification-service:latest
    ports:
      - ${NOTIFICATION_SERVICE_PORT:-8086}:8086
    networks:
      - notification-network
    depends_on:
      - notification-postgres
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:postgresql://notification-postgres:5432/notification_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}

  notification-postgres:
    image: postgres:16
    ports:
      - ${NOTIFICATION_DB_PORT:-5439}:5432
    networks:
      - notification-network
    environment:
      - POSTGRES_DB=notification_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - ${RABBITMQ_PORT:-5672}:5672
      - 15672:15672
    networks:
      - notification-network
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}

networks:
  notification-network:
    driver: bridge
