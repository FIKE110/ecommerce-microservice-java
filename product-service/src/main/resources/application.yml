api-gateway-url: http://${API_GATEWAY_HOST:localhost}:${API_GATEWAY_PORT:8081}
app:
  title: "PRODUCT-SERVICE"
  version: "1.0.0"
  description: "API documentation for My Product Service Microservice"
  url: ${api-gateway-url}
spring:
  banner:
    location: banner.txt
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommercems}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: product-service
api:
  url: '/api/v1/product'
rsa:
  public-key: classpath:certs/public.pem
server:
  port: ${PRODUCT_SERVICE_PORT:0}
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
springdoc:
  swagger-ui:
    path: ${api.url}/docs
  api-docs:
    path: ${api.url}/v3/api-docs
