services:
  payment-service:
    image: fortuneiyke/ecommerce-payment-service:latest
    ports:
      - ${PAYMENT_SERVICE_PORT:-8085}:8085
    networks:
      - payment-network
    depends_on:
      - payment-postgres
    environment:
      - SPRING_PROFILES_ACTIVE=default
      - SPRING_DATASOURCE_URL=jdbc:postgresql://payment-postgres:5432/payment_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://service-discovery:8761/eureka
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=${RABBITMQ_PORT}
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
      - INTERSWITCH_MERCHANT_CODE=${INTERSWITCH_MERCHANT_CODE}
      - INTERSWITCH_CURRENCY=${INTERSWITCH_CURRENCY}
      - INTERSWITCH_CLIENT_ID=${INTERSWITCH_CLIENT_ID}
      - INTERSWITCH_SECRET_KEY=${INTERSWITCH_SECRET_KEY}

  payment-postgres:
    image: postgres:16
    ports:
      - ${PAYMENT_DB_PORT:-5438}:5432
    networks:
      - payment-network
    environment:
      - POSTGRES_DB=payment_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - ${RABBITMQ_PORT:-5672}:5672
      - 15672:15672
    networks:
      - payment-network
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USERNAME}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}

networks:
  payment-network:
    driver: bridge
