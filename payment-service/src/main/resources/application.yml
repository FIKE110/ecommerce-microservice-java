api-gateway-url: http://${API_GATEWAY_HOST:localhost}:${API_GATEWAY_PORT:8081}
app:
  title: "PAYMENT-SERVICE"
  version: "1.0.0"
  description: "API documentation for My Payment Service Microservice"
  url: ${api-gateway-url}
spring:
  banner:
    location: banner.txt
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommercems}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  application:
    name: payment-service
api:
  url: '/api/v1/payment'
rsa:
  public-key: classpath:certs/public.pem
server:
  port: ${PAYMENT_SERVICE_PORT:0}
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
interswitch:
  merchant_code: ${INTERSWITCH_MERCHANT_CODE}
  currency: ${INTERSWITCH_CURRENCY:566}
  client_id: ${INTERSWITCH_CLIENT_ID}
  secret_key: ${INTERSWITCH_SECRET_KEY}
