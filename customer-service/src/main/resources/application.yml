api-gateway-url: http://${API_GATEWAY_HOST:localhost}:${API_GATEWAY_PORT:8081}
app:
  title: "CUSTOMER-SERVICE"
  version: "1.0.0"
  description: "API documentation for My Customer Service Microservice"
  url: ${api-gateway-url}
springdoc:
  swagger-ui:
    path: /api/v1/customer/docs
  api-docs:
    path: /api/v1/customer/v3/api-docs

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommercems}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  banner:
    location: banner.txt
  application:
    name: customer-service
rsa:
  public-key: classpath:certs/public.pem

logging:
  level:
    org.springframework.security: trace
api:
  version: /api/v1/customer
server:
  port: ${CUSTOMER_SERVICE_PORT:0}
eureka:
  instance:
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'
  zipkin:
    tracing:
      endpoint: http://${ZIPKIN_HOST:localhost}:${ZIPKIN_PORT:9411}/api/v2/spans
  tracing:
    sampling:
      probability: 1.0
